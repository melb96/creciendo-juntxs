<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Lista de Tutores</title>
    <link rel="stylesheet" th:href="@{/css/listas.css}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="container">
        <h2>Legajo de Tutores</h2>

        <a href="/tutores/nuevo" class="btn">➕ Registrar Nuevo Tutor</a>
        <a href="/home" class="btn btn-secondary">🏠 Volver al Inicio</a>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Relación Universitaria</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${lista}">
                        <td th:text="${t.id}"></td>
                        <td th:text="${t.apellido} + ', ' + ${t.nombre}" style="font-weight: bold;"></td>
                        <td th:text="${t.dni}"></td>
                        <td th:text="${t.telefono}"></td>
                        <td th:text="${t.relacionUniversitaria}"></td>
                        <td>
                            <a th:if="${t.usuario == null}" sec:authorize="hasAnyRole('ADMIN', 'OPERADOR')"
                                th:href="@{/usuarios/nuevo-tutor(tutorId=${t.id})}"
                                class="btn-action-grilla btn-crear">🔑 Crear Cuenta</a>

                            <span th:if="${t.usuario != null}" class="badge-activo">✔️ Cuenta Activa</span>

                            <a th:href="@{/tutores/editar/{id}(id=${t.id})}" class="btn-action-grilla btn-editar">✏️
                                Editar</a>

                            <a th:href="@{/tutores/eliminar/{id}(id=${t.id})}" class="btn-action-grilla btn-eliminar"
                                onclick="return confirm('¿Estás seguro de que deseas eliminar este tutor de forma permanente?');">🗑️
                                Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(lista)}">
                        <td colspan="8" class="empty-msg">No hay tutores registrados en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
