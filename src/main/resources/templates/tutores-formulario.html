<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Registrar Tutor</title>
    <link rel="stylesheet" th:href="@{/css/formularios.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="page-content">
        <div class="form-container">
            <h2 th:text="${tutor.id != null} ? 'Formulario: Modificar Datos del Tutor' : 'Formulario: Registro de Tutor'"></h2>

            <div class="error-msg" th:if="${error}" th:text="${error}"></div>

            <form th:action="${tutor.id != null} ? @{/tutores/actualizar} : @{/tutores/guardar}" th:object="${tutor}" method="POST">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Ej: Juan">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" th:field="*{apellido}" required placeholder="Ej: Pérez">
                </div>
                <div class="form-group">
                    <label for="dni">DNI (Sin puntos):</label>
                    <input type="text" id="dni" th:field="*{dni}" required placeholder="Ej: 35123456">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" th:field="*{telefono}" required placeholder="Ej: 3804112233">
                </div>
                <div class="form-group">
                    <label for="relacionUniversitaria">Estamento / Relación Universitaria:</label>
                    <select id="relacionUniversitaria" th:field="*{relacionUniversitaria}" required>
                        <option value="Estudiante">Estudiante</option>
                        <option value="Docente">Docente</option>
                        <option value="Nodocente">Nodocente</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" th:text="${tutor.id != null} ? '🔒 Guardar Cambios' : '💾 Guardar Registro'"></button>
                <a href="/tutores" class="btn-cancel">Volver a la Lista</a>
            </form>
        </div>
    </div>
    <div th:replace="~{/footer :: pie}"></div>
</body>
</html>
