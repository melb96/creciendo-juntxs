<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Gestión de Maestras</title>
    <link rel="stylesheet" th:href="@{/css/listas.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="container">
        <h2>Gestión de Maestras</h2>

        <a href="/maestras/nuevo" class="btn">➕ Nueva Maestra</a>
        <a href="/home" class="btn btn-secondary">🏠 Volver al Inicio</a>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Legajo</th>
                        <th>Nombre Completo</th>
                        <th>DNI</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${lista}">
                        <td class="text-bold" th:text="${m.legajo}"></td>
                        <td th:text="${m.apellido} + ', ' + ${m.nombre}"></td>
                        <td th:text="${m.dni}"></td>
                        <td>
                            <div class="actions-container">
                                <a th:href="@{/maestras/editar/{id}(id=${m.id})}" 
                                   class="btn-action-grilla btn-editar">✏️ Editar</a>
                                
                                <a th:href="@{/maestras/eliminar/{id}(id=${m.id})}" 
                                   class="btn-action-grilla btn-eliminar"
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar esta maestra?');">🗑️ Eliminar</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(lista)}">
                        <td colspan="4" class="empty-msg">No hay maestras registradas en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
