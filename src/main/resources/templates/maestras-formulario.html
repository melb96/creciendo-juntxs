<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Gestionar Maestra</title>
    <link rel="stylesheet" th:href="@{/css/formularios.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="page-content">
        <div class="form-container">
            <h2 th:text="${maestra.id != null} ? 'Formulario: Modificar Datos de la Maestra' : 'Formulario: Registro de Maestra'"></h2>

            <div class="error-msg" th:if="${error}" th:text="${error}"></div>

            <form th:action="${maestra.id != null} ? @{/maestras/actualizar} : @{/maestras/guardar}" 
                  th:object="${maestra}" 
                  method="POST">
                
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Ej: María">
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" th:field="*{apellido}" required placeholder="Ej: González">
                </div>
                
                <div class="form-group">
                    <label for="dni">DNI (Sin puntos):</label>
                    <input type="text" id="dni" th:field="*{dni}" required placeholder="Ej: 30123456">
                </div>
                
                <div class="form-group">
                    <label for="legajo">Legajo:</label>
                    <input type="text" id="legajo" th:field="*{legajo}" required placeholder="Ej: M-2026-001">
                </div>

                <button type="submit" class="btn-submit" 
                        th:text="${maestra.id != null} ? '🔒 Guardar Cambios' : '✅ Guardar Registro'">
                </button>
                <a th:href="@{/maestras}" class="btn-cancel">Volver a la Lista</a>
            </form>
        </div>
    </div>
    <div th:replace="~{/footer :: pie}"></div>
</body>
</html>
