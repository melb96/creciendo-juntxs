<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Gestionar Usuario</title>
    <link rel="stylesheet" th:href="@{/css/formularios.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="page-content">
        <div class="form-container">
            <h2 th:text="${tutorIdId != null} ? 'Vincular Usuario a Tutor' : (${usuario.id != null} ? 'Formulario: Modificar Usuario' : 'Formulario: Alta de Usuario')"></h2>

            <div class="error-msg" th:if="${error}" th:text="${error}"></div>

            <form th:action="${tutorIdId != null} ? @{/usuarios/guardar-tutor} : (${usuario.id != null} ? @{/usuarios/actualizar} : @{/usuarios/guardar})" th:object="${usuario}" method="POST">

                <input type="hidden" name="tutorId" th:value="${tutorIdId}" th:if="${tutorIdId != null}" />
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" th:field="*{email}" required placeholder="Ej: admin@unlar.edu.ar" th:readonly="${usuario.id != null}">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña de Acceso:</label>
                    <input type="password" id="password" th:field="*{password}" required placeholder="Clave de seguridad">
                </div>

                <div class="form-group" th:if="${tutorIdId == null}">
                    <label for="role">Asignar Rol Jerárquico:</label>
                    <select id="role" th:field="*{role}" required>
                        <option value="ADMIN" th:selected="${usuario.role == 'ADMIN'}">ADMIN (Acceso Completo)</option>
                        <option value="OPERADOR" th:selected="${usuario.role == 'OPERADOR'}">OPERADOR (Gestión sin Usuarios)</option>
                        <option value="TUTOR" th:if="${usuario.id != null && usuario.role == 'TUTOR'}" th:selected="${usuario.role == 'TUTOR'}">TUTOR (Solo Monitoreo)</option>
                    </select>
                </div>

                <input type="hidden" th:field="*{role}" th:if="${tutorIdId != null}" />

                <button type="submit" class="btn-submit" th:text="${usuario.id != null || tutorIdId != null} ? '🔒 Guardar Cambios' : '✅ Registrar Cuenta'"></button>
                <a th:href="${tutorIdId != null} ? '/tutores' : '/usuarios'" class="btn-cancel">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
