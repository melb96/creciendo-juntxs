<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" th:href="@{/images/logo-unlar.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creciendo Juntxs - Historial de Asistencia</title>
    <link rel="stylesheet" th:href="@{/css/listas.css}">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand-box">
            <a href="https://www.unlar.edu.ar/" target="_blank" rel="noopener noreferrer">
                <img th:src="@{/images/logo-unlar.png}" alt="Logo UNLaR" class="logo-img">
            </a>
            <div class="navbar-divider"></div>
            <a th:href="@{/home}" style="text-decoration: none;">
                <div>
                    <h1 class="project-text-logo">Creciendo Juntxs</h1>
                    <p class="navbar-subtitle">Guardería - Universidad Nacional de La Rioja</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="container">
        <h2>Historial Cronológico de Asistencias</h2>
        <div class="sub">
            👶 Infante: <strong class="text-primary" th:text="${infante.apellido} + ', ' + ${infante.nombre}"></strong> | DNI: <span class="text-bold" th:text="${infante.dni}"></span>
        </div>

        <a href="/infantes" class="btn btn-secondary">⬅ Volver a Legajos</a>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora Entrada</th>
                        <th>Hora Salida</th>
                        <th>Bitácora de Actividades / Novedades</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ast : ${historial}">
                        <td class="text-bold" th:text="${ast.fecha}"></td>
                        <td class="text-success text-bold" th:text="${ast.horaEntrada}"></td>
                        <td th:text="${ast.horaSalida != null ? ast.horaSalida : 'En sala / Activo'}"
                            th:classappend="${ast.horaSalida == null ? 'text-warning text-bold' : 'text-danger'}">
                        </td>
                        <td class="bitacora-text" th:text="${ast.bitacoraActividades}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(historial)}">
                        <td colspan="4" class="empty-msg">Este infante no registra asistencias cargadas en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
